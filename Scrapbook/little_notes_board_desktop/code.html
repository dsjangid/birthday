            "i still look at your photos and smile",
            "you make my heart feel full",

            "thank you for trusting me",
            "you're my little sunshine 🌸",
            "i hope this page makes you smile",
            "you deserve a lifetime of happiness",
            "my favourite story will always be us",
            "happy birthday to my favourite person ♡",
            "i'll always be glad that i met you"
        ];

        const notesGrid = document.getElementById('notes-grid');
        const boardWidth = 1400;
        const boardHeight = 1800;

        function createNote(index) {
            const isPink = Math.random() > 0.5;
            const rotation = (Math.random() * 10 - 5).toFixed(1);
            const x = Math.random() * (boardWidth - 250);
            const y = Math.random() * (boardHeight - 200);
            
            const card = document.createElement('div');
            card.className = `note-card absolute p-6 rounded-sm w-[220px] min-h-[140px] flex flex-col justify-between ${isPink ? 'bg-primary-container/40' : 'bg-white'} shadow-sm`;
            card.draggable = true;
            card.style.transform = `rotate(${rotation}deg)`;
            card.style.left = `${x}px`;
            card.style.top = `${y}px`;
            card.style.zIndex = Math.floor(Math.random() * 20);
            card.dataset.rotation = rotation;

            // Add washi tape occasionally
            if (Math.random() > 0.4) {
                const tape = document.createElement('div');
                tape.className = 'washi-tape absolute -top-2 left-1/2 -translate-x-1/2 opacity-80';
                card.appendChild(tape);
            }

            const text = document.createElement('p');
            text.className = 'font-label-personal text-label-personal text-on-surface-variant text-center my-auto leading-tight pointer-events-none';
            text.innerText = messages[index % messages.length];
            
            const footer = document.createElement('div');
            footer.className = 'flex justify-between items-center mt-4 opacity-30 pointer-events-none';
            footer.innerHTML = `
                <span class="material-symbols-outlined text-xs">favorite</span>
                <span class="text-[10px] font-label-caps">UMA • 2024</span>
            `;

            card.appendChild(text);
            card.appendChild(footer);

            // Drag event listeners
            let offsetX = 0;
            let offsetY = 0;

            card.addEventListener('dragstart', (e) => {
                card.style.opacity = '0.8';
                card.style.zIndex = '1000';
                const rect = card.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                e.dataTransfer.effectAllowed = 'move';
            });

            card.addEventListener('dragend', (e) => {
                card.style.opacity = '1';
                card.style.zIndex = Math.floor(Math.random() * 20);
            });

            notesGrid.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            });

            card.addEventListener('drag', (e) => {
                if (e.clientX !== 0 && e.clientY !== 0) {
                    const gridRect = notesGrid.getBoundingClientRect();
                    const newX = e.clientX - gridRect.left - offsetX;
                    const newY = e.clientY - gridRect.top - offsetY;
                    card.style.left = `${Math.max(0, Math.min(newX, boardWidth - 220))}px`;
                    card.style.top = `${Math.max(0, Math.min(newY, boardHeight - 140))}px`;
                }
            });
            
            return card;
        }

        // Generate 80 notes
        for (let i = 0; i < 80; i++) {
            notesGrid.appendChild(createNote(i));
        }

        // Simple mouse interaction parallax for atmospheric feel
        window.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            notesGrid.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
